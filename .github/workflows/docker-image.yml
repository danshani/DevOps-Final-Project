name: Build and Push Docker Image

# Run automatically on every push to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the repository code (including the Dockerfile)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub using a username variable and a secret token
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build the image from the Dockerfile and push it to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/final-python:latest
